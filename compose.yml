services:
  backend:
    build:
      context: ./urlgoatbackend
      dockerfile: Dockerfile
    ports:
      - "5150:80"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/80'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
  db:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    ports:
      - "1433:1433"
    environment:
      MSSQL_SA_PASSWORD: "S3cur3P@ssW0rd!"
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: false  # Disable SQL Server Agent
      MSSQL_LOG_QUERIES: "ON"    # Set to "ON" to log queries
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
  angular:
    build:
      context: ./urlgoatfrontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
